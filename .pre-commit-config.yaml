# Pre-commit hooks for tripwire.
#
# Install once per clone:
#     make pre-commit-install
#
# Run on all files (not just staged):
#     make pre-commit-run
#
# Pinned versions are bumped manually when the in-project tooling moves
# in pyproject.toml. NO pytest hook — too slow per commit; gate via CI
# or `make check`. mypy runs as a local hook so it picks up the project
# venv and the same config CI uses (pyproject.toml [tool.mypy]).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this in sync with the ruff version in pyproject.toml so the
    # hook formatting matches `make format` exactly.
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        # Match the scope of `make lint`: src/ and tests/ only.
        # Docs use product names (iTerm, etc.) that codespell flags.
        files: ^(src|tests)/
        args: [--skip=uv.lock]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # img/ holds shipped logo/icon assets; we don't rewrite their
        # bytes on a whitespace policy.
        exclude: ^img/
      - id: end-of-file-fixer
        exclude: ^img/
      - id: check-yaml
        # Many shipped templates and examples are frontmatter+body files
        # (delimited with `---`), which the YAML parser interprets as
        # multi-document. Allow that, and skip Jinja2 templates entirely
        # along with example YAMLs whose body is markdown rather than
        # parseable YAML.
        args: [--allow-multiple-documents]
        exclude: |
          (?x)^(
            src/tripwire/templates/.*\.j2|
            src/tripwire/templates/skills/project-manager/examples/.*\.yaml|
            src/tripwire/templates/agent_templates/.*\.yaml
          )$
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: mypy
        name: mypy (local)
        # Local hook so mypy runs in the project venv with full deps
        # available and the same config CI uses. Restricted to staged
        # files under src/tripwire to keep the per-commit cost low.
        entry: uv run mypy
        language: system
        types: [python]
        files: ^src/tripwire/
        require_serial: true
