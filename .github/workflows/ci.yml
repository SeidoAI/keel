name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - name: Sync
        run: uv sync
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Pytest
        run: uv run pytest tests/ -q --cov=src/tripwire --cov-report=term-missing --cov-fail-under=86

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - name: Sync
        run: uv sync
      - name: Mypy
        run: uv run mypy src/tripwire

  frontend-build:
    # Smoke-test the React build on every PR so broken Vite/TS configs
    # surface before the release workflow runs them.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Vitest + coverage
        run: npm run test:coverage

  wheel-smoke:
    # Mirror the verification publish.yml runs at release time so a
    # broken hatch hook or empty static/ bundle surfaces on the PR
    # rather than during the tag push.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - name: Build wheel (hatch hook drives frontend build)
        run: uv build
      - name: Verify wheel contains frontend bundle
        run: |
          set -eu
          wheel="$(ls dist/*.whl)"
          if ! unzip -l "$wheel" | grep -q 'tripwire/ui/static/index.html'; then
            echo "::error::Wheel $wheel is missing tripwire/ui/static/index.html"
            unzip -l "$wheel"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, frontend-test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - name: Sync python deps
        run: uv sync
      - name: Build frontend statics
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Pytest e2e
        run: uv run pytest -m e2e tests/ui/e2e/ -v
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Browser e2e
        working-directory: web
        run: npm run e2e
