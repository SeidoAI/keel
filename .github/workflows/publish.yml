name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      # Build frontend up-front so the wheel ships with a populated
      # src/tripwire/ui/static/. The hatch build hook in hatch_build.py
      # would also do this during `uv build`, but running it here keeps
      # the npm output in CI logs and fails fast on a bad frontend build.
      - name: Install frontend deps
        run: npm ci
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Build wheel and sdist
        env:
          TRIPWIRE_SKIP_FRONTEND_BUILD: "1"
        # `uv build` defaults to sdist → wheel-from-sdist for reproducibility,
        # but our sdist excludes `src/tripwire/ui/static` (it's a regenerated
        # artifact). Building the wheel from sdist therefore drops the npm
        # bundle even though we just produced it. Build them independently
        # so the wheel target reads `static/` from the source tree, where
        # `npm run build` above placed it. The hatch hook is the safety net
        # but is opted-out via TRIPWIRE_SKIP_FRONTEND_BUILD here — we already
        # built the bundle, no need to rebuild it.
        run: |
          uv build --wheel
          uv build --sdist
      # TRIPWIRE_SKIP_FRONTEND_BUILD disabled the hatch hook's internal
      # index.html sanity check, so re-assert it here before publishing.
      # Catches a silent emptyOutDir misconfig that would otherwise ship
      # a wheel with an empty static/ to PyPI.
      - name: Verify wheel contains frontend bundle
        run: |
          set -eu
          wheel="$(ls dist/*.whl)"
          if ! unzip -l "$wheel" | grep -q 'tripwire/ui/static/index.html'; then
            echo "::error::Wheel $wheel is missing tripwire/ui/static/index.html"
            unzip -l "$wheel"
            exit 1
          fi
      - name: Publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
