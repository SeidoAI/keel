name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/tripwire/ui/frontend/package-lock.json
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      # Build frontend up-front so the wheel ships with a populated
      # src/tripwire/ui/static/. The hatch build hook in hatch_build.py
      # would also do this during `uv build`, but running it here keeps
      # the npm output in CI logs and fails fast on a bad frontend build.
      - name: Install frontend deps
        run: npm ci
        working-directory: src/tripwire/ui/frontend
      - name: Build frontend
        run: npm run build
        working-directory: src/tripwire/ui/frontend
      - name: Build
        env:
          TRIPWIRE_SKIP_FRONTEND_BUILD: "1"
        run: uv build
      # TRIPWIRE_SKIP_FRONTEND_BUILD disabled the hatch hook's internal
      # index.html sanity check, so re-assert it here before publishing.
      # Catches a silent emptyOutDir misconfig that would otherwise ship
      # a wheel with an empty static/ to PyPI.
      - name: Verify wheel contains frontend bundle
        run: |
          set -eu
          wheel="$(ls dist/*.whl)"
          if ! unzip -l "$wheel" | grep -q 'tripwire/ui/static/index.html'; then
            echo "::error::Wheel $wheel is missing tripwire/ui/static/index.html"
            unzip -l "$wheel"
            exit 1
          fi
      - name: Publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
