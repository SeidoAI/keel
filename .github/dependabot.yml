# Dependabot configuration.
#
# - github-actions: weekly. Action majors move on a roughly-quarterly
#   cadence; weekly checks pick up minor/patch security bumps quickly
#   without flooding the PR queue.
# - pip: monthly. Python deps change less often and the lockfile is
#   the source of truth, so monthly is enough to keep things fresh.
#
# npm (frontend) is intentionally omitted for now — the React tree is
# large and the wheel ships a built bundle, so npm churn is internal.
# Add a third entry once we have a story for triaging frontend bumps.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
