# Built-in tripwire registry — event → tripwire-class mapping.
#
# v0.8.0 ships the primitive plus the canonical first tripwire
# (self-review on session.complete). Additional tripwires (AC
# substantiation, security trace, etc.) ship in v0.9 per
# docs/specs/2026-04-26-v09-tripwires-roadmap.md.
#
# Five lifecycle events are wired through the registry; only the one
# below has a registered tripwire in v0.8.0. Empty event keys are
# explicitly listed so the loader's contract surface is the full set.
session.complete:
  - id: self-review
    class: tripwire._internal.tripwires.self_review.SelfReviewTripwire
  - id: phase-transition
    class: tripwire._internal.tripwires.phase_transition.PhaseTransitionTripwire
  - id: followups-not-filed
    class: tripwire._internal.tripwires.followups_not_filed.FollowupsNotFiledTripwire
  - id: stopped-to-ask
    class: tripwire._internal.tripwires.stopped_to_ask.StoppedToAskTripwire
  - id: write-count
    class: tripwire._internal.tripwires.write_count.WriteCountTripwire
  - id: cost-ceiling
    class: tripwire._internal.tripwires.cost_ceiling.CostCeilingTripwire
issue.close: []
pr.open: []
validate.run: []
session.resume: []
