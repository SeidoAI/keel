## Context
The frontend SPA needs a JWT-based authentication endpoint. The endpoint
must consume the [[user-model]] for credential validation and implements
the contract in [[contract-auth-token]]. JWTs are stored in httpOnly
cookies, not localStorage — see [[dec-003-session-tokens]].

## Implements
REQ-AUTH-001, DEC-003

## Repo scope
- Repo: SeidoAI/web-app-backend
- Base branch: test
- Primary paths: `src/api/auth.py`, `tests/unit/test_auth.py`
- Required config: [[config-jwt-secret]]

## Requirements
- `POST /auth/token` accepts `{email, password}`, returns `{access_token, expires_in, token_type}`.
- JWT expires after 1 hour.
- Invalid credentials return 401 with the standard error envelope.
- Expired token replay returns 403.
- Must use [[user-model]] for lookups — no direct Firestore calls.
- Response shape must match [[contract-auth-token]].

