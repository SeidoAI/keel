## The invariant

Every entity (issue, session, node, comment) gets a UUID4 at creation.
**That UUID is permanent.** It must never change. It must never be
reassigned to a different entity. It survives renames, status flips,
human-key reassignments, and project moves.

## Why this is an invariant, not a practice

Practices have edge cases ("usually X, but sometimes Y"). Invariants
have none — a violation is a bug, not a preference.

External systems (events log, graph cache, downstream agents,
historical PRs) anchor on UUIDs precisely because they can trust
the value never moves. Any code path that mutates a UUID breaks
every reference.

## How it's enforced

- `tripwire validate` rejects entities whose `uuid` field changed
  between commits
- `tripwire next-key` allocates human keys; UUIDs are minted at
  entity creation and never re-minted
- Schema doesn't expose a "rename UUID" surface

## Related

- The human key (`KUI-42`) CAN be reassigned in narrow scenarios
  (typo correction at creation, never after first commit). The UUID
  cannot.
