## The principle

> *"Where does the human user's attention deliver most leverage to the project?"*

Every human surface in the system must justify itself against this
question. If a screen, panel, or notification doesn't pass it, cut.

## Why this is a principle, not a decision

A decision picks A over B once. A principle is the lens through which
*many* decisions are made. New screens, new panels, new alerting
choices all run through this question.

## How it shows up

- Decisions about what to put on the dashboard
- Decisions about whether to add a new alert/notification
- Decisions about progressive disclosure on detail screens

## Concrete derivatives

- The PM agent curates the inbox to a small surface
- Tripwires don't appear in the dashboard (agent-facing, not human)
- The dashboard renders one critical-path chain, not the full DAG
