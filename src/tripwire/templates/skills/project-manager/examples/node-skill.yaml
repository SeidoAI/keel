## What this skill is

The packaged set of instructions the PM agent loads on every
session. Comprises:

- `SKILL.md` — the entry-point document (~18KB)
- `references/` — 20 reference docs (schemas, workflows, policies)
- `examples/` — 14 canonical examples of issues, sessions, nodes,
  comments

## Who loads it

The `persona-pm-agent` (always). Other agents may load specific
references when they need PM-shaped context.

## Why a node, not just a directory

The skill is a definitional artifact that many other entities
reference: personas load it, principles cite it, every PM-facing
issue assumes it. Promoting it to a node means freshness checks
fire when SKILL.md changes, and "what does the PM agent know?"
becomes a graph query instead of a directory walk.

## Granularity rule

One node per skill *package* (project-manager, verification,
agent-messaging, backend-development). Individual reference docs
or commands inside a skill don't earn their own nodes unless
they're explicitly cited from issues or other nodes — at which
point promote them.
