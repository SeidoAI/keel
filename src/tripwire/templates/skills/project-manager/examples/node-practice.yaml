## The practice

When a list/queue/panel is empty, render the empty state as **active
reassurance** — "nothing blocking you right now" — not as a sad-face
"no items found" placeholder.

## When it applies

- The inbox blocked-bucket: empty = "you have no decisions pending"
- The critical-path spine: empty = "all in-flight work is independent"
- Tripwire-fires panel on S6: empty = "no agent drift this period"

## When it does NOT apply

- Lists where empty just means "you haven't created any yet" (issues,
  sessions, nodes for a new project). Treat those with onboarding
  guidance, not reassurance.

## How to tell which case you're in

Ask: "is the absence itself informative to the user?" If yes →
reassurance. If no → onboarding nudge.
