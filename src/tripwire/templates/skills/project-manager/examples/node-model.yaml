The User model represents a single user record in the Firestore users
collection. Fields:

- `uid` — Firebase auth UID (primary key)
- `email` — verified email address
- `display_name` — user-facing name
- `created_at` — ISO datetime of account creation
- `last_login` — ISO datetime of the most recent successful login

The model exposes `find_by_email()` and `verify_password()` for
authentication flows. Consumed by [[auth-token-endpoint]].
