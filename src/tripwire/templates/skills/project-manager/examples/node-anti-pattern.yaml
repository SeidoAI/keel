## The anti-pattern

Combining items that demand **different cognitive treatments** into a
single visual feed.

## Why it's bad

- **Interruptive items** (something is blocked, a decision is needed,
  a tripwire fired hard) require *stop, look, decide* attention.
- **Digest items** (a session completed, a status changed, a metric
  ticked) require *skim when convenient* attention.

When mixed:

- Urgent items get lost in the digest noise
- Digest items steal attention they didn't need
- The user develops "ignore the feed" reflex — both classes degrade

## What to do instead

Two visual surfaces, two cognitive modes. In tripwire's case:

- `bucket: blocked` — alert chrome, always visible
- `bucket: fyi` — muted chrome, collapsible

The visual encoding tells the user *which mode to engage* before
they read any item title.

