## Decision

Session tokens (JWTs) are stored in `httpOnly` cookies set by the server,
not in the browser's `localStorage`.

## Rationale

- localStorage is readable by any JavaScript running on the page,
  including compromised third-party dependencies. XSS → full token
  exfiltration.
- httpOnly cookies are inaccessible to JavaScript, limiting exfiltration
  to network-level attacks (which we already mitigate via TLS and
  SameSite=Strict).
- Legal/compliance team flagged localStorage storage as non-compliant
  with our data handling policy.

## Consequences

- Every endpoint that issues or reads JWTs must use the cookie helpers
  in `src/api/cookies.py`.
- The frontend SPA does not manage the token lifecycle — the backend sets
  and clears the cookie.
- Cross-origin calls require `credentials: 'include'`.

## Supersedes

None.
