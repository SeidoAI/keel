## Context
[[auth-token-endpoint]] currently has no rate limiting — a brute-force
attempt could hammer it. This issue adds a rate limit check that runs
BEFORE the [[user-model]] lookup, to avoid both account enumeration and
credential stuffing. The rate limit value is stored in
[[config-jwt-secret]]'s sibling secret (same module). The response must
still conform to [[contract-auth-token]].

## Implements
REQ-AUTH-002

## Repo scope
- Repo: SeidoAI/web-app-backend
- Base branch: test
- Primary paths: `src/api/auth.py` (existing; additive changes only)

## Requirements
- Rate limit: 5 attempts per minute per IP.
- After the limit is hit: return 429 with an `error` envelope matching
  [[contract-auth-token]]'s error shape.
- Limit check runs BEFORE the user lookup to prevent enumeration.
- Existing happy path on [[auth-token-endpoint]] is unchanged.

## Execution constraints
- Do not modify [[dec-003-session-tokens]]'s cookie handling.
- If any ambiguity blocks correct work, stop and ask.

## Acceptance criteria
- [ ] 429 after 5 attempts within one minute
- [ ] Happy path unchanged
- [ ] Error envelope matches [[contract-auth-token]]
- [ ] Limit resets after the window
- [ ] CI passing

## Test plan
```bash
uv run pytest tests/unit/test_auth_ratelimit.py -v
