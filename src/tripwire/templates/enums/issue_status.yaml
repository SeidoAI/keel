name: IssueStatus
description: Issue lifecycle states (v0.9.4 canonical — aligned with SessionStatus)
values:
  - id: planned
    label: Planned
    color: gray
    description: Captured but not yet promoted to active work
  - id: queued
    label: Queued
    color: blue
    description: Triaged, ready for pickup (issue equivalent of session "queued")
  - id: executing
    label: Executing
    color: yellow
    description: Agent actively working this issue
  - id: in_review
    label: In Review
    color: purple
    description: PR opened, PM reviewing code/project
  - id: verified
    label: Verified
    color: green
    description: PR merged, acceptance tests passed (QA/PM)
  - id: completed
    label: Completed
    color: lime
    description: Closed — concept nodes reconciled, followups logged
  - id: abandoned
    label: Abandoned
    color: red
    description: Closed without completing (replaced by another issue or dropped)
  - id: deferred
    label: Deferred
    color: gray
    description: Consciously skipped within a session — carries forward through phase transitions
