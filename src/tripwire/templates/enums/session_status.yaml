name: SessionStatus
description: Agent session lifecycle states (v0.9.4 — pruned dead values)
values:
  - id: planned
    label: Planned
    color: gray
  - id: queued
    label: Queued
    color: cyan
  # executing: agent actively working (local spawn or orchestrator-managed)
  - id: executing
    label: Executing
    color: blue
  # in_review: session PR opened, PM reviewing
  - id: in_review
    label: In Review
    color: purple
  # verified: PR verified (PM fills the QA role until a QA agent ships)
  - id: verified
    label: Verified
    color: green
  # completed: canonical terminal-success state. `tripwire session complete`
  # writes this.
  - id: completed
    label: Completed
    color: green
  - id: failed
    label: Failed
    color: red
  - id: paused
    label: Paused
    color: yellow
  # abandoned: terminal-but-not-claimed-success
  - id: abandoned
    label: Abandoned
    color: gray
# v0.9.4 pruned 5 aspirational v0.7-era values that were never written or
# in the transition table: active, waiting_for_ci, waiting_for_review,
# waiting_for_deploy, re_engaged. Pre-v0.9.4 data with those values
# loads via SessionStatus.__missing__ aliasing (collapsing to the
# closest live state). Drop alias-on-read in v1.0.
