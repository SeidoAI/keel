# Session artifact manifest — declares what every session must produce.
#
# Each artifact declares:
# - produced_at: which session phase the file is written in. v0.7b phases:
#   planning, in_progress, in_review, verified, done.
# - produced_by: which agent writes the initial version
# - owned_by: which agent owns updates (often equals produced_by)
#
# The validator enforces stage-aware requirements: task-checklist.md
# is not required until the session reaches `in_progress` since the
# execution agent writes it.
#
# An `approval_gate: true` on any artifact tells the orchestrator to
# stop the agent after that artifact is written and wait for human
# approval before re-engaging.
#
# Projects can add, remove, or reshape artifacts via
# project.yaml.artifact_manifest_overrides. Sessions can override this
# manifest via `artifact_overrides` in their session YAML.

artifacts:
  - name: plan
    file: plan.md
    template: plan.md.j2
    produced_at: planning
    produced_by: pm
    owned_by: pm
    required: true
    approval_gate: false

  - name: task-checklist
    file: task-checklist.md
    template: task-checklist.md.j2
    produced_at: in_progress
    produced_by: execution-agent
    owned_by: execution-agent
    required: true
    approval_gate: false

  - name: verification-checklist
    file: verification-checklist.md
    template: verification-checklist.md.j2
    produced_at: planning
    produced_by: pm
    owned_by: pm
    required: true
    approval_gate: false

  - name: recommended-testing-plan
    file: recommended-testing-plan.md
    template: recommended-testing-plan.md.j2
    produced_at: done
    produced_by: execution-agent
    owned_by: execution-agent
    required: true
    approval_gate: false

  - name: post-completion-comments
    file: post-completion-comments.md
    template: post-completion-comments.md.j2
    produced_at: done
    produced_by: execution-agent
    owned_by: execution-agent
    required: true
    approval_gate: false

  # v0.7.9 §A2 — agent's four-lens self-review committed to the PT
  # branch BEFORE the PR is opened. The PR-comment self-review is
  # generated FROM this file.
  - name: self-review
    file: self-review.md
    template: self-review.md.j2
    produced_at: done
    produced_by: execution-agent
    owned_by: execution-agent
    required: true
    approval_gate: false

  # v0.7.9 §A3 — PM-side response to the self-review. YAML-format so
  # the validator can parse `items` programmatically. See validator
  # rules `pm_response_covers_self_review` and
  # `pm_response_followups_resolve`.
  - name: pm-response
    file: pm-response.yaml
    template: pm-response.yaml.j2
    produced_at: done
    produced_by: pm
    owned_by: pm
    required: true
    approval_gate: false
