JWT authentication endpoint for the frontend SPA. Accepts email + password
credentials, validates against the Firestore user collection via
[[user-model]], and returns a signed JWT with 1-hour expiry.

Response shape:

```json
{
  "access_token": "eyJ...",
  "expires_in": 3600,
  "token_type": "bearer"
}
```

The endpoint implements the contract in [[contract-auth-token]] and
follows the session-token decision in [[dec-003-session-tokens]]
(httpOnly cookies, no localStorage).
