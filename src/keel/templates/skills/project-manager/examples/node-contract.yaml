OpenAPI 3.1 contract for the authentication endpoint. Covers:

- `POST /auth/token` — request/response shapes, error envelope

Response envelope for errors:

```json
{
  "error": {
    "code": "invalid_credentials",
    "message": "Email or password is incorrect."
  }
}
```

The contract is the source of truth for [[auth-token-endpoint]]. Any
implementation drift is a bug.
