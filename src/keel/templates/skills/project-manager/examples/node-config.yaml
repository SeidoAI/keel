The HMAC signing key used by [[auth-token-endpoint]] to sign and verify
JWTs. Read at service startup via `os.environ["JWT_SECRET"]`.

Constraints:

- Minimum 32 characters (enforced by the startup check in `src/api/config.py`)
- Rotated quarterly by the infra team
- Different value per environment — `test`, `staging`, `prod`
- Never logged, never passed over the wire
