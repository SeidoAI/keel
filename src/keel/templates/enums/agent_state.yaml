name: AgentState
description: |
  Agent state reported via `status` messages. Powers the structured status
  message body so the UI can show "what is the agent doing right now"
  without parsing free-form text.
values:
  - id: investigating
    label: Investigating
    color: blue
  - id: planning
    label: Planning
    color: purple
  - id: awaiting_plan_approval
    label: Awaiting Plan Approval
    color: yellow
  - id: implementing
    label: Implementing
    color: cyan
  - id: testing
    label: Testing
    color: cyan
  - id: debugging
    label: Debugging
    color: orange
  - id: refactoring
    label: Refactoring
    color: lime
  - id: documenting
    label: Documenting
    color: pink
  - id: self_verifying
    label: Self-Verifying
    color: cyan
  - id: blocked
    label: Blocked
    color: red
  - id: handed_off
    label: Handed Off
    color: gray
  - id: done
    label: Done
    color: green
